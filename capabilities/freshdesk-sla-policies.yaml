naftiko: 1.0.0-alpha2
info:
  label: Freshworks Freshdesk API — SLA Policies
  description: 'Freshworks Freshdesk API — SLA Policies. 1 operations. Lead operation: List all SLA policies. Self-contained
    Naftiko capability covering one Freshworks business surface.'
  tags:
  - Freshworks
  - SLA Policies
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FRESHWORKS_API_KEY: FRESHWORKS_API_KEY
capability:
  consumes:
  - type: http
    namespace: freshdesk-sla-policies
    baseUri: https://{domain}.freshdesk.com/api/v2
    description: Freshworks Freshdesk API — SLA Policies business capability. Self-contained, no shared references.
    resources:
    - name: sla_policies
      path: /sla_policies
      operations:
      - name: listslapolicies
        method: GET
        description: List all SLA policies
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.FRESHWORKS_USER}}'
      password: '{{env.FRESHWORKS_PASS}}'
  exposes:
  - type: rest
    namespace: freshdesk-sla-policies-rest
    port: 8080
    description: REST adapter for Freshworks Freshdesk API — SLA Policies. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/sla-policies
      name: sla-policies
      description: REST surface for sla_policies.
      operations:
      - method: GET
        name: listslapolicies
        description: List all SLA policies
        call: freshdesk-sla-policies.listslapolicies
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: freshdesk-sla-policies-mcp
    port: 9090
    transport: http
    description: MCP adapter for Freshworks Freshdesk API — SLA Policies. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-all-sla-policies
      description: List all SLA policies
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: freshdesk-sla-policies.listslapolicies
      outputParameters:
      - type: object
        mapping: $.
