naftiko: 1.0.0-alpha2
info:
  label: Freshworks Freshservice API — Tickets
  description: 'Freshworks Freshservice API — Tickets. 6 operations. Lead operation: List all tickets. Self-contained Naftiko
    capability covering one Freshworks business surface.'
  tags:
  - Freshworks
  - Tickets
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FRESHWORKS_API_KEY: FRESHWORKS_API_KEY
capability:
  consumes:
  - type: http
    namespace: freshservice-tickets
    baseUri: https://{domain}.freshservice.com/api/v2
    description: Freshworks Freshservice API — Tickets business capability. Self-contained, no shared references.
    resources:
    - name: tickets
      path: /tickets
      operations:
      - name: listtickets
        method: GET
        description: List all tickets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: filter
          in: query
          type: string
          description: Pre-defined filter to apply.
        - name: requester_id
          in: query
          type: integer
          description: Filter tickets by requester ID.
        - name: email
          in: query
          type: string
          description: Filter tickets by requester email.
        - name: updated_since
          in: query
          type: string
          description: Return tickets updated after this timestamp.
        - name: type
          in: query
          type: string
          description: Filter tickets by type (Incident, Service Request).
      - name: createticket
        method: POST
        description: Create a ticket
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: tickets-ticket_id
      path: /tickets/{ticket_id}
      operations:
      - name: getticket
        method: GET
        description: View a ticket
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateticket
        method: PUT
        description: Update a ticket
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteticket
        method: DELETE
        description: Delete a ticket
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: tickets-ticket_id-restore
      path: /tickets/{ticket_id}/restore
      operations:
      - name: restoreticket
        method: PUT
        description: Restore a deleted ticket
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.FRESHWORKS_USER}}'
      password: '{{env.FRESHWORKS_PASS}}'
  exposes:
  - type: rest
    namespace: freshservice-tickets-rest
    port: 8080
    description: REST adapter for Freshworks Freshservice API — Tickets. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/tickets
      name: tickets
      description: REST surface for tickets.
      operations:
      - method: GET
        name: listtickets
        description: List all tickets
        call: freshservice-tickets.listtickets
        with:
          filter: rest.filter
          requester_id: rest.requester_id
          email: rest.email
          updated_since: rest.updated_since
          type: rest.type
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createticket
        description: Create a ticket
        call: freshservice-tickets.createticket
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/tickets/{ticket-id}
      name: tickets-ticket-id
      description: REST surface for tickets-ticket_id.
      operations:
      - method: GET
        name: getticket
        description: View a ticket
        call: freshservice-tickets.getticket
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updateticket
        description: Update a ticket
        call: freshservice-tickets.updateticket
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteticket
        description: Delete a ticket
        call: freshservice-tickets.deleteticket
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/tickets/{ticket-id}/restore
      name: tickets-ticket-id-restore
      description: REST surface for tickets-ticket_id-restore.
      operations:
      - method: PUT
        name: restoreticket
        description: Restore a deleted ticket
        call: freshservice-tickets.restoreticket
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: freshservice-tickets-mcp
    port: 9090
    transport: http
    description: MCP adapter for Freshworks Freshservice API — Tickets. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-all-tickets
      description: List all tickets
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: freshservice-tickets.listtickets
      with:
        filter: tools.filter
        requester_id: tools.requester_id
        email: tools.email
        updated_since: tools.updated_since
        type: tools.type
      outputParameters:
      - type: object
        mapping: $.
    - name: create-ticket
      description: Create a ticket
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: freshservice-tickets.createticket
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: view-ticket
      description: View a ticket
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: freshservice-tickets.getticket
      outputParameters:
      - type: object
        mapping: $.
    - name: update-ticket
      description: Update a ticket
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: freshservice-tickets.updateticket
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-ticket
      description: Delete a ticket
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: freshservice-tickets.deleteticket
      outputParameters:
      - type: object
        mapping: $.
    - name: restore-deleted-ticket
      description: Restore a deleted ticket
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: freshservice-tickets.restoreticket
      outputParameters:
      - type: object
        mapping: $.
