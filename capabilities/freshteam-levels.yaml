naftiko: 1.0.0-alpha2
info:
  label: Freshworks Freshteam API — Levels
  description: 'Freshworks Freshteam API — Levels. 1 operations. Lead operation: List all levels. Self-contained Naftiko capability
    covering one Freshworks business surface.'
  tags:
  - Freshworks
  - Levels
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FRESHWORKS_API_KEY: FRESHWORKS_API_KEY
capability:
  consumes:
  - type: http
    namespace: freshteam-levels
    baseUri: https://{domain}.freshteam.com/api
    description: Freshworks Freshteam API — Levels business capability. Self-contained, no shared references.
    resources:
    - name: levels
      path: /levels
      operations:
      - name: listlevels
        method: GET
        description: List all levels
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.FRESHWORKS_API_KEY}}'
  exposes:
  - type: rest
    namespace: freshteam-levels-rest
    port: 8080
    description: REST adapter for Freshworks Freshteam API — Levels. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/levels
      name: levels
      description: REST surface for levels.
      operations:
      - method: GET
        name: listlevels
        description: List all levels
        call: freshteam-levels.listlevels
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: freshteam-levels-mcp
    port: 9090
    transport: http
    description: MCP adapter for Freshworks Freshteam API — Levels. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-all-levels
      description: List all levels
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: freshteam-levels.listlevels
      outputParameters:
      - type: object
        mapping: $.
