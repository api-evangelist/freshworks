naftiko: 1.0.0-alpha2
info:
  label: Freshworks Freshcaller API
  description: The Freshcaller API provides access to cloud-based phone system functionality for contact center operations.
    It allows developers to export call data, call recordings, user information, and agent team details stored in the Freshcaller
    system. The API supports integration of voice and telephony workflows into broader business applications, enabling organizations
    to automate call center reporting, synchronize agent data, and build custom dashboards around their phone operations.
  tags:
  - Freshworks
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: freshworks
    baseUri: https://yourdomain.freshcaller.com/api/v1
    description: Freshworks Freshcaller API HTTP API.
    authentication:
      type: apikey
      in: header
      name: X-Api-Auth
      value: '{{FRESHWORKS_TOKEN}}'
    resources:
    - name: calls
      path: /calls
      operations:
      - name: listcalls
        method: GET
        description: List all calls
        inputParameters:
        - name: by_time[from]
          in: query
          type: string
          description: Filter calls from this timestamp (ISO 8601).
        - name: by_time[to]
          in: query
          type: string
          description: Filter calls up to this timestamp (ISO 8601).
        - name: has_ancestry
          in: query
          type: boolean
          description: Filter calls that have parent-child relationships.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: calls-call-id
      path: /calls/{call_id}
      operations:
      - name: getcall
        method: GET
        description: View a call
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: calls-call-id-recording
      path: /calls/{call_id}/recording
      operations:
      - name: getcallrecording
        method: GET
        description: Get call recording
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: users
      path: /users
      operations:
      - name: listusers
        method: GET
        description: List all users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createuser
        method: POST
        description: Create a user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: users-user-id
      path: /users/{user_id}
      operations:
      - name: getuser
        method: GET
        description: View a user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateuser
        method: PUT
        description: Update a user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: user-statuses
      path: /user_statuses
      operations:
      - name: listuserstatuses
        method: GET
        description: List all user statuses
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: teams
      path: /teams
      operations:
      - name: listteams
        method: GET
        description: List all teams
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createteam
        method: POST
        description: Create a team
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: teams-team-id
      path: /teams/{team_id}
      operations:
      - name: getteam
        method: GET
        description: View a team
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateteam
        method: PUT
        description: Update a team
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: call-metrics
      path: /call_metrics
      operations:
      - name: listcallmetrics
        method: GET
        description: List call metrics
        inputParameters:
        - name: by_time[from]
          in: query
          type: string
          description: Start of the time range (ISO 8601).
        - name: by_time[to]
          in: query
          type: string
          description: End of the time range (ISO 8601).
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: freshworks-rest
    description: REST adapter for Freshworks Freshcaller API.
    resources:
    - path: /calls
      name: listcalls
