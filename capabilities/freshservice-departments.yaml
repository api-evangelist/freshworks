naftiko: 1.0.0-alpha2
info:
  label: Freshworks Freshservice API — Departments
  description: 'Freshworks Freshservice API — Departments. 1 operations. Lead operation: List all departments. Self-contained
    Naftiko capability covering one Freshworks business surface.'
  tags:
  - Freshworks
  - Departments
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FRESHWORKS_API_KEY: FRESHWORKS_API_KEY
capability:
  consumes:
  - type: http
    namespace: freshservice-departments
    baseUri: https://{domain}.freshservice.com/api/v2
    description: Freshworks Freshservice API — Departments business capability. Self-contained, no shared references.
    resources:
    - name: departments
      path: /departments
      operations:
      - name: listdepartments
        method: GET
        description: List all departments
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.FRESHWORKS_USER}}'
      password: '{{env.FRESHWORKS_PASS}}'
  exposes:
  - type: rest
    namespace: freshservice-departments-rest
    port: 8080
    description: REST adapter for Freshworks Freshservice API — Departments. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/departments
      name: departments
      description: REST surface for departments.
      operations:
      - method: GET
        name: listdepartments
        description: List all departments
        call: freshservice-departments.listdepartments
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: freshservice-departments-mcp
    port: 9090
    transport: http
    description: MCP adapter for Freshworks Freshservice API — Departments. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: list-all-departments
      description: List all departments
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: freshservice-departments.listdepartments
      outputParameters:
      - type: object
        mapping: $.
