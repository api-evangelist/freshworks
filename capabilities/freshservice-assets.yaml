naftiko: 1.0.0-alpha2
info:
  label: Freshworks Freshservice API — Assets
  description: 'Freshworks Freshservice API — Assets. 5 operations. Lead operation: List all assets. Self-contained Naftiko
    capability covering one Freshworks business surface.'
  tags:
  - Freshworks
  - Assets
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FRESHWORKS_API_KEY: FRESHWORKS_API_KEY
capability:
  consumes:
  - type: http
    namespace: freshservice-assets
    baseUri: https://{domain}.freshservice.com/api/v2
    description: Freshworks Freshservice API — Assets business capability. Self-contained, no shared references.
    resources:
    - name: assets
      path: /assets
      operations:
      - name: listassets
        method: GET
        description: List all assets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createasset
        method: POST
        description: Create an asset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: assets-asset_id
      path: /assets/{asset_id}
      operations:
      - name: getasset
        method: GET
        description: View an asset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateasset
        method: PUT
        description: Update an asset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteasset
        method: DELETE
        description: Delete an asset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.FRESHWORKS_USER}}'
      password: '{{env.FRESHWORKS_PASS}}'
  exposes:
  - type: rest
    namespace: freshservice-assets-rest
    port: 8080
    description: REST adapter for Freshworks Freshservice API — Assets. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/assets
      name: assets
      description: REST surface for assets.
      operations:
      - method: GET
        name: listassets
        description: List all assets
        call: freshservice-assets.listassets
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createasset
        description: Create an asset
        call: freshservice-assets.createasset
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/assets/{asset-id}
      name: assets-asset-id
      description: REST surface for assets-asset_id.
      operations:
      - method: GET
        name: getasset
        description: View an asset
        call: freshservice-assets.getasset
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updateasset
        description: Update an asset
        call: freshservice-assets.updateasset
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteasset
        description: Delete an asset
        call: freshservice-assets.deleteasset
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: freshservice-assets-mcp
    port: 9090
    transport: http
    description: MCP adapter for Freshworks Freshservice API — Assets. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-all-assets
      description: List all assets
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: freshservice-assets.listassets
      outputParameters:
      - type: object
        mapping: $.
    - name: create-asset
      description: Create an asset
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: freshservice-assets.createasset
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: view-asset
      description: View an asset
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: freshservice-assets.getasset
      outputParameters:
      - type: object
        mapping: $.
    - name: update-asset
      description: Update an asset
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: freshservice-assets.updateasset
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-asset
      description: Delete an asset
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: freshservice-assets.deleteasset
      outputParameters:
      - type: object
        mapping: $.
