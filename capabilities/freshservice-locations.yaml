naftiko: 1.0.0-alpha2
info:
  label: Freshworks Freshservice API — Locations
  description: 'Freshworks Freshservice API — Locations. 1 operations. Lead operation: List all locations. Self-contained
    Naftiko capability covering one Freshworks business surface.'
  tags:
  - Freshworks
  - Locations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FRESHWORKS_API_KEY: FRESHWORKS_API_KEY
capability:
  consumes:
  - type: http
    namespace: freshservice-locations
    baseUri: https://{domain}.freshservice.com/api/v2
    description: Freshworks Freshservice API — Locations business capability. Self-contained, no shared references.
    resources:
    - name: locations
      path: /locations
      operations:
      - name: listlocations
        method: GET
        description: List all locations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.FRESHWORKS_USER}}'
      password: '{{env.FRESHWORKS_PASS}}'
  exposes:
  - type: rest
    namespace: freshservice-locations-rest
    port: 8080
    description: REST adapter for Freshworks Freshservice API — Locations. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/locations
      name: locations
      description: REST surface for locations.
      operations:
      - method: GET
        name: listlocations
        description: List all locations
        call: freshservice-locations.listlocations
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: freshservice-locations-mcp
    port: 9090
    transport: http
    description: MCP adapter for Freshworks Freshservice API — Locations. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-all-locations
      description: List all locations
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: freshservice-locations.listlocations
      outputParameters:
      - type: object
        mapping: $.
