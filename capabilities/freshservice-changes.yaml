naftiko: 1.0.0-alpha2
info:
  label: Freshworks Freshservice API — Changes
  description: 'Freshworks Freshservice API — Changes. 5 operations. Lead operation: List all changes. Self-contained Naftiko
    capability covering one Freshworks business surface.'
  tags:
  - Freshworks
  - Changes
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FRESHWORKS_API_KEY: FRESHWORKS_API_KEY
capability:
  consumes:
  - type: http
    namespace: freshservice-changes
    baseUri: https://{domain}.freshservice.com/api/v2
    description: Freshworks Freshservice API — Changes business capability. Self-contained, no shared references.
    resources:
    - name: changes
      path: /changes
      operations:
      - name: listchanges
        method: GET
        description: List all changes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createchange
        method: POST
        description: Create a change request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: changes-change_id
      path: /changes/{change_id}
      operations:
      - name: getchange
        method: GET
        description: View a change request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatechange
        method: PUT
        description: Update a change request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletechange
        method: DELETE
        description: Delete a change request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.FRESHWORKS_USER}}'
      password: '{{env.FRESHWORKS_PASS}}'
  exposes:
  - type: rest
    namespace: freshservice-changes-rest
    port: 8080
    description: REST adapter for Freshworks Freshservice API — Changes. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/changes
      name: changes
      description: REST surface for changes.
      operations:
      - method: GET
        name: listchanges
        description: List all changes
        call: freshservice-changes.listchanges
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createchange
        description: Create a change request
        call: freshservice-changes.createchange
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/changes/{change-id}
      name: changes-change-id
      description: REST surface for changes-change_id.
      operations:
      - method: GET
        name: getchange
        description: View a change request
        call: freshservice-changes.getchange
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatechange
        description: Update a change request
        call: freshservice-changes.updatechange
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletechange
        description: Delete a change request
        call: freshservice-changes.deletechange
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: freshservice-changes-mcp
    port: 9090
    transport: http
    description: MCP adapter for Freshworks Freshservice API — Changes. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-all-changes
      description: List all changes
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: freshservice-changes.listchanges
      outputParameters:
      - type: object
        mapping: $.
    - name: create-change-request
      description: Create a change request
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: freshservice-changes.createchange
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: view-change-request
      description: View a change request
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: freshservice-changes.getchange
      outputParameters:
      - type: object
        mapping: $.
    - name: update-change-request
      description: Update a change request
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: freshservice-changes.updatechange
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-change-request
      description: Delete a change request
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: freshservice-changes.deletechange
      outputParameters:
      - type: object
        mapping: $.
