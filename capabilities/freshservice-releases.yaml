naftiko: 1.0.0-alpha2
info:
  label: Freshworks Freshservice API — Releases
  description: 'Freshworks Freshservice API — Releases. 3 operations. Lead operation: List all releases. Self-contained Naftiko
    capability covering one Freshworks business surface.'
  tags:
  - Freshworks
  - Releases
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FRESHWORKS_API_KEY: FRESHWORKS_API_KEY
capability:
  consumes:
  - type: http
    namespace: freshservice-releases
    baseUri: https://{domain}.freshservice.com/api/v2
    description: Freshworks Freshservice API — Releases business capability. Self-contained, no shared references.
    resources:
    - name: releases
      path: /releases
      operations:
      - name: listreleases
        method: GET
        description: List all releases
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createrelease
        method: POST
        description: Create a release
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: releases-release_id
      path: /releases/{release_id}
      operations:
      - name: getrelease
        method: GET
        description: View a release
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: release_id
          in: path
          type: integer
          description: The ID of the release.
          required: true
    authentication:
      type: basic
      username: '{{env.FRESHWORKS_USER}}'
      password: '{{env.FRESHWORKS_PASS}}'
  exposes:
  - type: rest
    namespace: freshservice-releases-rest
    port: 8080
    description: REST adapter for Freshworks Freshservice API — Releases. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/releases
      name: releases
      description: REST surface for releases.
      operations:
      - method: GET
        name: listreleases
        description: List all releases
        call: freshservice-releases.listreleases
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createrelease
        description: Create a release
        call: freshservice-releases.createrelease
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/releases/{release-id}
      name: releases-release-id
      description: REST surface for releases-release_id.
      operations:
      - method: GET
        name: getrelease
        description: View a release
        call: freshservice-releases.getrelease
        with:
          release_id: rest.release_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: freshservice-releases-mcp
    port: 9090
    transport: http
    description: MCP adapter for Freshworks Freshservice API — Releases. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-all-releases
      description: List all releases
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: freshservice-releases.listreleases
      outputParameters:
      - type: object
        mapping: $.
    - name: create-release
      description: Create a release
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: freshservice-releases.createrelease
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: view-release
      description: View a release
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: freshservice-releases.getrelease
      with:
        release_id: tools.release_id
      outputParameters:
      - type: object
        mapping: $.
