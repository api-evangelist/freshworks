naftiko: 1.0.0-alpha2
info:
  label: Freshworks Freshchat API — Messages
  description: 'Freshworks Freshchat API — Messages. 2 operations. Lead operation: List messages in a conversation. Self-contained
    Naftiko capability covering one Freshworks business surface.'
  tags:
  - Freshworks
  - Messages
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FRESHWORKS_API_KEY: FRESHWORKS_API_KEY
capability:
  consumes:
  - type: http
    namespace: freshchat-messages
    baseUri: https://{domain}.freshchat.com/v2
    description: Freshworks Freshchat API — Messages business capability. Self-contained, no shared references.
    resources:
    - name: conversations-conversation_id-messages
      path: /conversations/{conversation_id}/messages
      operations:
      - name: listconversationmessages
        method: GET
        description: List messages in a conversation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: sendmessage
        method: POST
        description: Send a message in a conversation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.FRESHWORKS_API_KEY}}'
  exposes:
  - type: rest
    namespace: freshchat-messages-rest
    port: 8080
    description: REST adapter for Freshworks Freshchat API — Messages. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/conversations/{conversation-id}/messages
      name: conversations-conversation-id-messages
      description: REST surface for conversations-conversation_id-messages.
      operations:
      - method: GET
        name: listconversationmessages
        description: List messages in a conversation
        call: freshchat-messages.listconversationmessages
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: sendmessage
        description: Send a message in a conversation
        call: freshchat-messages.sendmessage
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: freshchat-messages-mcp
    port: 9090
    transport: http
    description: MCP adapter for Freshworks Freshchat API — Messages. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-messages-conversation
      description: List messages in a conversation
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: freshchat-messages.listconversationmessages
      outputParameters:
      - type: object
        mapping: $.
    - name: send-message-conversation
      description: Send a message in a conversation
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: freshchat-messages.sendmessage
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
