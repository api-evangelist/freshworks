naftiko: 1.0.0-alpha2
info:
  label: Freshworks Freshteam API — Roles
  description: 'Freshworks Freshteam API — Roles. 1 operations. Lead operation: List all roles. Self-contained Naftiko capability
    covering one Freshworks business surface.'
  tags:
  - Freshworks
  - Roles
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FRESHWORKS_API_KEY: FRESHWORKS_API_KEY
capability:
  consumes:
  - type: http
    namespace: freshteam-roles
    baseUri: https://{domain}.freshteam.com/api
    description: Freshworks Freshteam API — Roles business capability. Self-contained, no shared references.
    resources:
    - name: roles
      path: /roles
      operations:
      - name: listroles
        method: GET
        description: List all roles
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.FRESHWORKS_API_KEY}}'
  exposes:
  - type: rest
    namespace: freshteam-roles-rest
    port: 8080
    description: REST adapter for Freshworks Freshteam API — Roles. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/roles
      name: roles
      description: REST surface for roles.
      operations:
      - method: GET
        name: listroles
        description: List all roles
        call: freshteam-roles.listroles
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: freshteam-roles-mcp
    port: 9090
    transport: http
    description: MCP adapter for Freshworks Freshteam API — Roles. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-all-roles
      description: List all roles
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: freshteam-roles.listroles
      outputParameters:
      - type: object
        mapping: $.
