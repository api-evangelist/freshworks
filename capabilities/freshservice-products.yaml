naftiko: 1.0.0-alpha2
info:
  label: Freshworks Freshservice API — Products
  description: 'Freshworks Freshservice API — Products. 1 operations. Lead operation: List all products. Self-contained Naftiko
    capability covering one Freshworks business surface.'
  tags:
  - Freshworks
  - Products
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FRESHWORKS_API_KEY: FRESHWORKS_API_KEY
capability:
  consumes:
  - type: http
    namespace: freshservice-products
    baseUri: https://{domain}.freshservice.com/api/v2
    description: Freshworks Freshservice API — Products business capability. Self-contained, no shared references.
    resources:
    - name: products
      path: /products
      operations:
      - name: listproducts
        method: GET
        description: List all products
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.FRESHWORKS_USER}}'
      password: '{{env.FRESHWORKS_PASS}}'
  exposes:
  - type: rest
    namespace: freshservice-products-rest
    port: 8080
    description: REST adapter for Freshworks Freshservice API — Products. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/products
      name: products
      description: REST surface for products.
      operations:
      - method: GET
        name: listproducts
        description: List all products
        call: freshservice-products.listproducts
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: freshservice-products-mcp
    port: 9090
    transport: http
    description: MCP adapter for Freshworks Freshservice API — Products. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-all-products
      description: List all products
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: freshservice-products.listproducts
      outputParameters:
      - type: object
        mapping: $.
