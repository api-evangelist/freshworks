specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Freshworks
providerId: freshworks
created: '2026-05-04'
modified: '2026-05-04'
reconciled: true
tags:
  - Rate Limiting
  - CRM
description: Freshdesk and Freshchat APIs enforce per-account rate limits.
sources:
  - https://www.freshworks.com/freshdesk/pricing/
  - https://developers.freshdesk.com/api/#ratelimit
headers:
  limit: X-RateLimit-Total
  remaining: X-RateLimit-Remaining
  used: X-RateLimit-Used-CurrentRequest
responseCodes:
  throttled: 429
limits:
  - name: Freshdesk Growth
    scope: account
    metric: requests_per_minute
    limit: 100
    timeFrame: minute
  - name: Freshdesk Pro
    scope: account
    metric: requests_per_minute
    limit: 400
    timeFrame: minute
  - name: Freshdesk Enterprise
    scope: account
    metric: requests_per_minute
    limit: 700
    timeFrame: minute
  - name: Public APIs default
    scope: account
    metric: requests_per_minute
    limit: 50
    timeFrame: minute
