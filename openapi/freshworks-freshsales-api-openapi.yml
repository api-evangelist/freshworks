        '401':
          $ref: '#/components/responses/Unauthorized'
  /notes/{note_id}:
    delete:
      operationId: deleteNote
      summary: Delete a note
      description: >-
        Deletes a note from the CRM.
      tags:
        - Notes
      parameters:
        - name: note_id
          in: path
          required: true
          description: The ID of the note.
          schema:
            type: integer
      responses:
        '204':
          description: Note deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /sales_activities:
    get:
      operationId: listSalesActivities
      summary: List all sales activities
      description: >-
        Retrieves a paginated list of all sales activities in the CRM.
      tags:
        - Sales Activities
      parameters:
        - $ref: '#/components/parameters/PageParam'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  sales_activities:
                    type: array
                    items:
                      $ref: '#/components/schemas/SalesActivity'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createSalesActivity
      summary: Create a sales activity
      description: >-
        Creates a new sales activity record in the CRM.
      tags:
        - Sales Activities
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SalesActivityCreate'
      responses:
        '200':
          description: Sales activity created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  sales_activity:
                    $ref: '#/components/schemas/SalesActivity'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
components:
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      in: header
      name: Authorization
      description: >-
        Token-based authentication. Use the format "Token token=your_api_key".
  parameters:
    PageParam:
      name: page
      in: query
      description: Page number for pagination.
      schema:
        type: integer
        minimum: 1
        default: 1
    SortParam:
      name: sort
      in: query
      description: Field to sort by.
      schema:
        type: string
    SortTypeParam:
      name: sort_type
      in: query
      description: Sort order direction.
      schema:
        type: string
        enum:
          - asc
          - desc
    ContactIdParam:
      name: contact_id
      in: path
      required: true
      description: The ID of the contact.
      schema:
        type: integer
    AccountIdParam:
      name: account_id
      in: path
      required: true
      description: The ID of the account.
      schema:
        type: integer
    DealIdParam:
      name: deal_id
      in: path
      required: true
      description: The ID of the deal.
      schema:
        type: integer
    LeadIdParam:
      name: lead_id
      in: path
      required: true
      description: The ID of the lead.
      schema:
        type: integer
    TaskIdParam:
      name: task_id
      in: path
      required: true
      description: The ID of the task.
      schema:
        type: integer
  responses:
    BadRequest:
      description: The request body or parameters are invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication credentials are missing or invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    Contact:
      type: object
      properties:
        id:
          type: integer
          description: Unique ID of the contact.
        first_name:
          type: string
          description: First name.
        last_name:
          type: string
          description: Last name.
        display_name:
          type: string
          description: Display name.
        email:
          type: string
          format: email
          description: Primary email address.
        work_number:
          type: string
