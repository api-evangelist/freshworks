openapi: 3.1.0
info:
  title: Freshworks Freshsales API
  description: >-
    The Freshsales API is a RESTful API that enables developers to access and
    manage CRM data within Freshsales. It supports operations for contacts,
    accounts, deals, leads, tasks, appointments, notes, and sales activities.
    The API uses token-based authentication and allows developers to read,
    modify, add, or delete CRM data, making it possible to build custom
    integrations, automate sales workflows, and synchronize Freshsales data
    with other business applications.
  version: '1.0'
  contact:
    name: Freshworks Support
    url: https://support.freshsales.io/
  termsOfService: https://www.freshworks.com/terms/
externalDocs:
  description: Freshsales API Documentation
  url: https://developers.freshworks.com/crm/api/
servers:
  - url: https://{domain}.myfreshworks.com/crm/sales/api
    description: Freshsales Production Server
    variables:
      domain:
        default: yourdomain
        description: Your Freshworks bundle alias
tags:
  - name: Accounts
    description: >-
      Manage company accounts with which you have business relationships.
  - name: Appointments
    description: >-
      Manage scheduled appointments and meetings.
  - name: Contacts
    description: >-
      Manage customer contacts and their associated information in the CRM.
  - name: Deals
    description: >-
      Manage sales deals and their pipeline progression.
  - name: Leads
    description: >-
      Manage sales leads before they are converted to contacts or accounts.
  - name: Notes
    description: >-
      Manage notes attached to CRM records.
  - name: Sales Activities
    description: >-
      Track and manage sales activity records.
  - name: Tasks
    description: >-
      Manage tasks associated with sales activities.
security:
  - apiKeyAuth: []
paths:
  /contacts:
    get:
      operationId: listContacts
      summary: List all contacts
      description: >-
        Retrieves a paginated list of all contacts in the CRM. Supports
        filtering and sorting by various contact fields.
      tags:
        - Contacts
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SortParam'
        - $ref: '#/components/parameters/SortTypeParam'
        - name: filter
          in: query
          description: Pre-defined view filter to apply.
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  contacts:
                    type: array
                    items:
                      $ref: '#/components/schemas/Contact'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createContact
      summary: Create a contact
      description: >-
        Creates a new contact in the CRM with the specified properties.
      tags:
        - Contacts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactCreate'
      responses:
        '200':
          description: Contact created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  contact:
                    $ref: '#/components/schemas/Contact'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /contacts/{contact_id}:
    get:
      operationId: getContact
      summary: View a contact
      description: >-
        Retrieves the details of a specific contact by their ID.
      tags:
        - Contacts
      parameters:
        - $ref: '#/components/parameters/ContactIdParam'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  contact:
                    $ref: '#/components/schemas/Contact'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateContact
      summary: Update a contact
      description: >-
        Updates the properties of an existing contact.
      tags:
        - Contacts
      parameters:
        - $ref: '#/components/parameters/ContactIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactCreate'
      responses:
        '200':
          description: Contact updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  contact:
                    $ref: '#/components/schemas/Contact'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteContact
      summary: Delete a contact
      description: >-
        Deletes a contact from the CRM.
      tags:
        - Contacts
      parameters:
        - $ref: '#/components/parameters/ContactIdParam'
      responses:
        '204':
          description: Contact deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
