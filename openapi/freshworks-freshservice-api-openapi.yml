components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: >-
        Use your API key as the username and X as the password. The API
        key can be found in your Freshservice profile settings.
  parameters:
    PageParam:
      name: page
      in: query
      description: Page number for pagination.
      schema:
        type: integer
        minimum: 1
        default: 1
    PerPageParam:
      name: per_page
      in: query
      description: Number of results per page (max 100).
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 30
    TicketIdParam:
      name: ticket_id
      in: path
      required: true
      description: The ID of the ticket.
      schema:
        type: integer
    ProblemIdParam:
      name: problem_id
      in: path
      required: true
      description: The ID of the problem.
      schema:
        type: integer
    ChangeIdParam:
      name: change_id
      in: path
      required: true
      description: The ID of the change request.
      schema:
        type: integer
    AssetIdParam:
      name: asset_id
      in: path
      required: true
      description: The display ID of the asset.
      schema:
        type: integer
    RequesterIdParam:
      name: requester_id
      in: path
      required: true
      description: The ID of the requester.
      schema:
        type: integer
    AgentIdParam:
      name: agent_id
      in: path
      required: true
      description: The ID of the agent.
      schema:
        type: integer
  responses:
    BadRequest:
      description: The request body or parameters are invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication credentials are missing or invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    Ticket:
      type: object
      properties:
        id:
          type: integer
          description: Unique ID of the ticket.
        subject:
          type: string
          description: Subject of the ticket.
        description:
          type: string
          description: HTML description of the ticket.
        description_text:
          type: string
          description: Plain text description of the ticket.
        status:
          type: integer
          description: >-
            Status of the ticket. 2=Open, 3=Pending, 4=Resolved, 5=Closed.
        priority:
          type: integer
          description: >-
            Priority of the ticket. 1=Low, 2=Medium, 3=High, 4=Urgent.
        type:
          type: string
          description: Type of the ticket (Incident, Service Request).
        source:
          type: integer
          description: Source channel of the ticket.
        requester_id:
          type: integer
          description: ID of the requester.
        responder_id:
          type: integer
          description: ID of the assigned agent.
        group_id:
          type: integer
          description: ID of the assigned group.
        department_id:
          type: integer
          description: ID of the associated department.
        category:
          type: string
          description: Category of the ticket.
        sub_category:
          type: string
          description: Sub-category of the ticket.
        item_category:
          type: string
          description: Item category of the ticket.
        email:
          type: string
          format: email
          description: Email of the requester.
        tags:
          type: array
          items:
            type: string
          description: Tags associated with the ticket.
        due_by:
          type: string
          format: date-time
          description: Due date for ticket resolution.
        fr_due_by:
          type: string
          format: date-time
          description: Due date for first response.
        is_escalated:
          type: boolean
          description: Whether the ticket has been escalated.
        custom_fields:
          type: object
          additionalProperties: true
          description: Custom field values.
        created_at:
          type: string
          format: date-time
          description: Timestamp when the ticket was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the ticket was last updated.
    TicketCreate:
      type: object
      required:
        - subject
        - description
        - email
        - status
        - priority
      properties:
        subject:
