openapi: 3.1.0
info:
  title: Freshworks Freshcaller Accounts Business Hours API
  description: The Freshcaller API provides access to cloud-based phone system functionality for contact center operations. It allows developers to export call data, call recordings, user information, and agent team details stored in the Freshcaller system. The API supports integration of voice and telephony workflows into broader business applications, enabling organizations to automate call center reporting, synchronize agent data, and build custom dashboards around their phone operations.
  version: '1.0'
  contact:
    name: Freshworks Support
    url: https://support.freshcaller.com/
  termsOfService: https://www.freshworks.com/terms/
servers:
- url: https://{domain}.freshcaller.com/api/v1
  description: Freshcaller Production Server
  variables:
    domain:
      default: yourdomain
      description: Your Freshcaller subdomain
security:
- apiKeyAuth: []
tags:
- name: Business Hours
  description: Manage business hours configurations.
paths:
  /business_hours:
    get:
      operationId: listBusinessHours
      summary: List all business hours
      description: Retrieves a list of all business hours configurations in the helpdesk.
      tags:
      - Business Hours
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BusinessHours'
        '401':
          $ref: '#/components/responses/Unauthorized'
components:
  schemas:
    BusinessHours:
      type: object
      properties:
        id:
          type: integer
          description: Unique ID of the business hours configuration.
        name:
          type: string
          description: Name of the business hours configuration.
        description:
          type: string
          description: Description of the business hours.
        time_zone:
          type: string
          description: Time zone for the business hours.
        is_default:
          type: boolean
          description: Whether this is the default business hours.
        created_at:
          type: string
          format: date-time
          description: Timestamp when the configuration was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the configuration was last updated.
    Error:
      type: object
      properties:
        description:
          type: string
          description: Human-readable error message.
        errors:
          type: array
          description: List of specific validation errors.
          items:
            type: object
            properties:
              field:
                type: string
                description: Field that caused the error.
              message:
                type: string
                description: Error message for the field.
              code:
                type: string
                description: Error code.
  responses:
    Unauthorized:
      description: Authentication credentials are missing or invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-Api-Auth
      description: API key authentication. The API key can be found in your Freshcaller admin settings.
externalDocs:
  description: Freshcaller API Documentation
  url: https://developers.freshcaller.com/api/
